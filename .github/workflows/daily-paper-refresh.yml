name: Daily Paper Refresh

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      refresh_today:
        description: "Delete today's earlier tracker output before running"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-paper-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify OpenAI API key secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Prepare tracker refresh
        env:
          REFRESH_TODAY: ${{ inputs.refresh_today || 'false' }}
        run: node scripts/prepare-paper-tracker-refresh.mjs

      - name: Run Codex research refresh
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/paper-tracker.md
          output-file: codex-output.md
          sandbox: workspace-write
          codex-args: '["--config","web_search=\"live\""]'
          model: gpt-5.4-mini
          effort: low

      - name: Show Codex final message
        if: always()
        run: |
          if [ -f codex-output.md ]; then
            cat codex-output.md
          fi

      - name: Commit changes to automation branch
        id: commit
        env:
          BRANCH: automation/daily-paper-refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper-tracker/data paper-tracker/reports
          if git diff --cached --quiet; then
            echo "No tracker changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update paper tracker"
          git push --force origin "HEAD:$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create, update, and merge pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: automation/daily-paper-refresh
        run: |
          pr_number="$(gh pr list \
            --head "$BRANCH" \
            --base master \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$pr_number" ]; then
            gh pr create \
              --head "$BRANCH" \
              --base master \
              --title "Update paper tracker" \
              --body "Automated daily paper-tracker refresh generated by Codex." \
              --assignee cublicma \
              --reviewer cublicma
            pr_number="$(gh pr list \
              --head "$BRANCH" \
              --base master \
              --state open \
              --json number \
              --jq '.[0].number // empty')"
          fi

          if [ -n "$pr_number" ]; then
            gh pr merge "$pr_number" --squash --delete-branch || \
              echo "Pull request #$pr_number is ready and waiting for a repository-rule condition or manual approval."
          fi
