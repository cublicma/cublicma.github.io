name: Daily Paper Refresh

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-paper-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify OpenAI API key secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run Codex research refresh
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/paper-tracker.md
          output-file: codex-output.md
          sandbox: workspace-write
          codex-args: '["--config","web_search=\"live\"","--ask-for-approval","never","--ephemeral"]'
          model: gpt-5.4
          effort: medium

      - name: Show Codex final message
        if: always()
        run: |
          if [ -f codex-output.md ]; then
            cat codex-output.md
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paper-tracker/data paper-tracker/reports
          if git diff --cached --quiet; then
            echo "No tracker changes to commit."
            exit 0
          fi
          git commit -m "Update paper tracker"
          git push
