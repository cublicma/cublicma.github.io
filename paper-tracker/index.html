<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>论文追踪 | Dex Manipulation</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <a class="brand" href="./">Paper Tracker</a>
        <nav class="navlinks" aria-label="站点工具">
          <a href="https://github.com/cublicma/cublicma.github.io/edit/master/paper-tracker/config.json">编辑配置</a>
          <a href="https://github.com/cublicma/cublicma.github.io/actions/workflows/daily-paper-refresh.yml">手动运行</a>
          <a href="https://github.com/cublicma/cublicma.github.io/tree/master/paper-tracker/reports">报告源码</a>
        </nav>
      </div>
      <nav class="topicbar" aria-label="论文专题">
        <a class="topic-link is-active" href="./" aria-current="page">Dex Manipulation</a>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Tactile Sensing</span>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Humanoid Robotics</span>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Robot Learning</span>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>Dex Manipulation</h1>
        </div>
        <div class="status-panel" aria-live="polite">
          <span class="label">最近运行</span>
          <strong id="run-time">读取中</strong>
          <span id="item-count">--</span>
        </div>
      </section>

      <section class="summary-grid">
        <article class="panel latest">
          <div class="section-head">
            <h2>最新摘要</h2>
            <a id="latest-report-link" href="#">打开 Markdown</a>
          </div>
          <p id="latest-summary">正在读取最新结果...</p>
          <div id="caveats" class="caveats"></div>
        </article>

        <article class="panel config">
          <div class="section-head">
            <h2>搜索配置</h2>
            <a href="https://github.com/cublicma/cublicma.github.io/edit/master/paper-tracker/config.json">修改</a>
          </div>
          <dl id="config-list"></dl>
        </article>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>本次发现</h2>
          <span id="items-label">等待数据</span>
        </div>
        <div id="items" class="items"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>历史报告</h2>
          <span id="reports-label">--</span>
        </div>
        <div id="reports" class="reports"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
