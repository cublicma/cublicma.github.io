<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>论文追踪 | Dex Manipulation</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="topbar">
        <a class="brand" href="./">Paper Tracker</a>
        <nav class="navlinks" aria-label="站点工具">
          <button class="text-button" type="button" data-open-config>编辑配置</button>
          <a href="https://github.com/cublicma/cublicma.github.io/actions/workflows/daily-paper-refresh.yml">手动运行</a>
          <a href="https://github.com/cublicma/cublicma.github.io/tree/master/paper-tracker/reports">报告源码</a>
        </nav>
      </div>
      <nav class="topicbar" aria-label="论文专题">
        <a class="topic-link is-active" href="./" aria-current="page">Dex Manipulation</a>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Tactile Sensing</span>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Humanoid Robotics</span>
        <span class="topic-link is-disabled" aria-disabled="true" title="专题尚未配置">Robot Learning</span>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div>
          <h1>Dex Manipulation</h1>
        </div>
        <div class="status-panel" aria-live="polite">
          <span class="label">最近运行</span>
          <strong id="run-time">读取中</strong>
          <span id="item-count">--</span>
        </div>
      </section>

      <section class="panel latest digest-panel">
        <div class="section-head digest-head">
          <div>
            <span class="section-kicker">Daily Briefing</span>
            <h2>今日摘要与精读</h2>
          </div>
          <a id="latest-report-link" href="#">打开 Markdown</a>
        </div>

        <div class="speech-player" aria-label="语音朗读">
          <button id="speech-play" class="primary-button speech-play" type="button" disabled>
            <span aria-hidden="true">▶</span>
            <span>播放全部</span>
          </button>
          <button id="speech-pause" class="audio-icon-button" type="button" aria-label="暂停" title="暂停" disabled>Ⅱ</button>
          <button id="speech-stop" class="audio-icon-button" type="button" aria-label="停止" title="停止" disabled>■</button>
          <label class="speech-select">
            <span>语音</span>
            <select id="speech-language">
              <option value="auto">中英自动</option>
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </label>
          <label class="speech-select">
            <span>语速</span>
            <select id="speech-rate">
              <option value="0.85">0.85x</option>
              <option value="1" selected>1.0x</option>
              <option value="1.15">1.15x</option>
              <option value="1.3">1.3x</option>
            </select>
          </label>
          <span id="speech-status" class="speech-status" aria-live="polite">等待内容</span>
        </div>

        <p id="latest-summary">正在读取最新结果...</p>
        <div id="daily-analysis" class="daily-analysis"></div>
        <div id="caveats" class="caveats"></div>
      </section>

      <section class="panel config">
        <div class="section-head">
          <h2>搜索配置</h2>
          <button class="text-button" type="button" data-open-config>修改</button>
        </div>
        <dl id="config-list"></dl>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>本次发现</h2>
          <span id="items-label">等待数据</span>
        </div>
        <div id="items" class="items"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>历史报告</h2>
          <span id="reports-label">--</span>
        </div>
        <div id="reports" class="reports"></div>
      </section>
    </main>

    <dialog id="config-editor" aria-labelledby="config-editor-title">
      <form id="config-form" method="dialog">
        <div class="dialog-head">
          <div>
            <span class="dialog-kicker">Dex Manipulation</span>
            <h2 id="config-editor-title">编辑搜索配置</h2>
          </div>
          <button class="icon-button" type="button" data-close-config aria-label="关闭">&times;</button>
        </div>

        <div class="form-grid">
          <label class="field field-wide">
            <span>关键词</span>
            <textarea id="config-keywords" rows="8" required spellcheck="false"></textarea>
            <small>每行一个关键词</small>
          </label>

          <label class="field field-wide">
            <span>搜索来源</span>
            <textarea id="config-sources" rows="6" required spellcheck="false"></textarea>
            <small>每行一个来源</small>
          </label>

          <label class="field">
            <span>回看天数</span>
            <input id="config-lookback" type="number" min="1" max="365" required>
          </label>

          <label class="field">
            <span>每次最多条目</span>
            <input id="config-max-items" type="number" min="1" max="50" required>
          </label>
        </div>

        <details class="advanced-fields">
          <summary>高级范围</summary>
          <div class="form-grid advanced-grid">
            <label class="field field-wide">
              <span>收录条件</span>
              <textarea id="config-include" rows="5" spellcheck="false"></textarea>
            </label>
            <label class="field field-wide">
              <span>排除条件</span>
              <textarea id="config-exclude" rows="4" spellcheck="false"></textarea>
            </label>
            <label class="field field-wide">
              <span>排序偏好</span>
              <textarea id="config-ranking" rows="4" spellcheck="false"></textarea>
            </label>
          </div>
        </details>

        <div class="dialog-actions">
          <span id="config-submit-status">仅接受 cublicma 提交的请求</span>
          <div>
            <button class="secondary-button" type="button" data-close-config>取消</button>
            <button class="primary-button" type="submit">提交审批</button>
          </div>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
